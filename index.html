<!doctype html>
<html lang="it" translate="no">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/ico" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#1e1e2d" />

  <!-- Native Feel Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KASH" />
  <meta name="application-name" content="KASH" />

  <!-- Windows specific -->
  <meta name="msapplication-TileColor" content="#1e1e2d" />
  <meta name="msapplication-TileImage" content="/web-app-manifest-144x144.png" />
  <meta name="msapplication-config" content="none" />

  <title>KASH - Gestione Finanziaria</title>

  <script>
    // Unregister any old service workers and clear their caches
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
      caches.keys().then((cacheNames) => {
        cacheNames.forEach((cacheName) => caches.delete(cacheName));
      });
    }
  </script>
</head>

<body>
  <!-- Splash Screen Overlay -->
  <div id="splash-screen">
    <div class="splash-content">
      <img src="/kash-icon.png" alt="KASH Logo" class="splash-logo" />
      <h1 class="splash-title">KASH</h1>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    // Hide splash screen after 2.5 seconds
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => {
            splash.style.display = 'none';
          }, 500); // Wait for fade out animation
        }
      }, 2500);
    });
  </script>
</body>

</html>
